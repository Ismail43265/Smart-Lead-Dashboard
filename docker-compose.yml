services:
  mongo:
    image: mongo:7
    container_name: smart-leads-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: smart-leads-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/smart-leads-dashboard
      JWT_SECRET: smart_leads_secret_key
      NODE_ENV: development
      CLIENT_URL: http://localhost:5173
    depends_on:
      - mongo

  frontend:
    build:
      context: ./Frontend/client
      dockerfile: Dockerfile
    container_name: smart-leads-frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api
    depends_on:
      - backend

volumes:
  mongo_data: